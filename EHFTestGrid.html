<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Audiology Generator</title>
    <style>
        @keyframes bootUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        :root {
            --left-color: #60a5fa;
            --right-color: #f87171;
        }

        /* Custom Sleek Scrollbar for Main Window */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background: radial-gradient(circle at 10% 50%, rgba(59, 130, 246, 0.15), transparent 40%),
                        radial-gradient(circle at 90% 50%, rgba(239, 68, 68, 0.12), transparent 40%),
                        #050507;
            color: #e4e4e7;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden;
            animation: bootUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphic Top HUD */
        #topBar {
            height: 85px;
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            flex-shrink: 0;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hud-title-container { width: 220px; }
        .hud-title-container h1 { margin:0; font-size: 14px; color: rgba(255,255,255,0.4); font-weight: 500; letter-spacing: 1px; }

        .hud-display {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex-grow: 1; transition: all 0.2s ease;
        }

        .hud-status {
            font-size: 11px; text-transform: uppercase; letter-spacing: 3px;
            color: #71717a; margin-bottom: 6px; font-weight: 600; text-align: center;
        }

        .hud-values {
            font-size: 28px; font-weight: 200; color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.1); text-align: center;
        }

        .hud-values span.highlight { font-weight: 500; color: #e4e4e7; }

        /* Sleek Glass Toggle */
        .toggle-wrapper {
            display: flex; align-items: center; gap: 12px;
            font-size: 13px; font-weight: 500; color: #a1a1aa; width: 220px; justify-content: flex-end;
        }

        .switch { position: relative; display: inline-block; width: 44px; height: 22px; flex-shrink: 0;}
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.05); border-radius: 22px; transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 2px; bottom: 2px; background-color: #a1a1aa; border-radius: 50%; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        input:checked + .slider { background-color: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
        input:checked + .slider:before { transform: translateX(22px); background-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); }

        /* Main Content Layout */
        #content {
            flex: 1; padding: 25px 40px; display: flex; flex-direction: column; gap: 25px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Frosted Glass Ear Sections */
        .ear-section {
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; padding: 20px 25px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex; flex-direction: column; gap: 10px;
        }

        .section-title {
            font-size: 14px; font-weight: 600; margin: 0; padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06); letter-spacing: 2px;
        }

        .right-title { color: var(--right-color); text-shadow: 0 0 10px rgba(248, 113, 113, 0.3); }
        .left-title { color: var(--left-color); text-shadow: 0 0 10px rgba(96, 165, 250, 0.3); }

        .freq-row {
            display: flex; align-items: stretch;
            background: rgba(0,0,0,0.15); border-radius: 10px; padding: 6px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .freq-label {
            width: 80px; flex-shrink: 0; font-size: 14px; font-weight: 500;
            color: rgba(255,255,255,0.7); text-align: right; padding-right: 18px;
            display: flex; align-items: center; justify-content: flex-end;
        }

        .button-row {
            display: flex;
            flex-wrap: nowrap; /* Forces one line for desktop */
            gap: 6px;
            flex-grow: 1;
            overflow-x: auto; /* Allows trackpad horizontal scrolling if window isn't wide enough */
            padding-bottom: 4px; /* Space for the thin scrollbar */
        }

        /* Subtle scrollbar for the individual button rows */
        .button-row::-webkit-scrollbar { height: 4px; }
        .button-row::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .button-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .button-row::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        /* Fixed-Size Glass Buttons for Uniform Grid */
        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px; padding: 7px 0;
            width: 54px; /* Fixed width ensures strict grid alignment */
            flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s cubic-bezier(0.2, 1, 0.3, 1);
            color: #a1a1aa; box-sizing: border-box;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2);
            color: #fff; transform: translateY(-1px);
        }

        /* Glass Active States */
        .right-ear-btn.active {
            background: rgba(239, 68, 68, 0.2); border-color: #fca5a5; color: #fff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3), inset 0 0 10px rgba(239, 68, 68, 0.2);
        }

        .left-ear-btn.active {
            background: rgba(59, 130, 246, 0.2); border-color: #93c5fd; color: #fff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3), inset 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .btn.pulsing { animation: pulse-glass 0.5s infinite alternate; }
        @keyframes pulse-glass { from { opacity: 1; } to { opacity: 0.5; } }

        .btn-db { font-size: 13px; font-weight: 500; pointer-events: none; }
        .btn-off { font-size: 10px; opacity: 0.5; margin-top: 3px; font-weight: 400; pointer-events: none; }


        /* =========================================
           MOBILE RESPONSIVE MEDIA QUERIES
           ========================================= */
        @media (max-width: 900px) {
            #topBar {
                height: auto; flex-direction: column; padding: 15px 20px; gap: 15px;
            }
            .hud-title-container { display: none; }
            .hud-display { order: -1; width: 100%; }
            .hud-values { font-size: 22px; }
            .toggle-wrapper { width: 100%; justify-content: center; }
            #content { padding: 15px 15px; gap: 15px; }
            .ear-section { padding: 15px; }
            .freq-row { flex-direction: column; align-items: stretch; padding: 12px; }
            .freq-label {
                width: auto; text-align: left; padding-right: 0; padding-bottom: 8px;
                margin-bottom: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                color: #fff; justify-content: flex-start;
            }
            .button-row {
                flex-wrap: wrap; /* On mobile, let them naturally wrap into multiple lines */
                justify-content: flex-start; overflow-x: visible;
            }
            .btn { width: 52px; padding: 10px 0; }
        }
    </style>
</head>
<body data-kmwindow="SCREEN(Main,Center,0%),SCREEN(Main,Center,10%),1900,1000" data-kmwindowbuttons="none">

    <div id="topBar">
        <div class="hud-title-container">
            <h1>TONE WORKSPACE</h1>
        </div>
        
        <div class="hud-display" id="hud">
            <div class="hud-status" id="hudStatus">SYSTEM STANDBY</div>
            <div class="hud-values" id="hudValues">Select a frequency node</div>
        </div>

        <div class="toggle-wrapper">
            <span>Pulse Array</span>
            <label class="switch">
                <input type="checkbox" id="pulseToggle">
                <span class="slider"></span>
            </label>
            <span>Pure Tone</span>
        </div>
    </div>

    <div id="content">
        <div id="rightEarContainer" class="ear-section">
            <h2 class="section-title right-title">RIGHT CHANNEL</h2>
        </div>
        
        <div id="leftEarContainer" class="ear-section">
            <h2 class="section-title left-title">LEFT CHANNEL</h2>
        </div>
    </div>

    <script>
        // Data Config - All >= 13kHz end at -33.6 (Offset 0)
        const config = [
            {
                ear: 'RIGHT EAR',
                containerId: 'rightEarContainer',
                pan: 1,
                btnClass: 'right-ear-btn',
                groups: [
                    { freq: 14500, start: -56.6, end: -33.6 },
                    { freq: 14000, start: -65.6, end: -33.6 },
                    { freq: 13500, start: -65.6, end: -33.6 },
                    { freq: 13000, start: -65.6, end: -33.6 }
                ]
            },
            {
                ear: 'LEFT EAR',
                containerId: 'leftEarContainer',
                pan: -1,
                btnClass: 'left-ear-btn',
                groups: [
                    { freq: 14000, start: -42.6, end: -33.6 },
                    { freq: 13500, start: -49.6, end: -33.6 },
                    { freq: 13000, start: -65.6, end: -33.6 },
                    { freq: 12500, start: -73.6, end: -53.6 }, // Unchanged (< 13k)
                    { freq: 12000, start: -73.6, end: -53.6 }  // Unchanged (< 13k)
                ]
            }
        ];

        const pulseToggle = document.getElementById('pulseToggle');
        const hudStatus = document.getElementById('hudStatus');
        const hudValues = document.getElementById('hudValues');
        const hud = document.getElementById('hud');

        function adjustWindowHeight() {
            if (window.KeyboardMaestro) {
                setTimeout(() => {
                    // Force a nice, wide 1900px window for KM on Mac
                    window.KeyboardMaestro.ResizeWindow("1900,1000");
                }, 50);
            }
        }

        // Build UI
        config.forEach(section => {
            const container = document.getElementById(section.containerId);
            
            section.groups.forEach(group => {
                const row = document.createElement('div');
                row.className = 'freq-row';
                
                const label = document.createElement('div');
                label.className = 'freq-label';
                label.innerText = `${group.freq / 1000} kHz`;
                row.appendChild(label);

                const btnRow = document.createElement('div');
                btnRow.className = 'button-row';

                // Add small invisible padding at end of scroll row so rightmost button doesn't hug edge perfectly
                const padEnd = document.createElement('div');
                padEnd.style.width = '2px'; padEnd.style.flexShrink = '0';

                for (let db = group.start; db <= group.end + 0.1; db += 1) {
                    const exactDb = parseFloat(db.toFixed(1));
                    const offset = Math.round(exactDb + 33.6);

                    const btn = document.createElement('div');
                    btn.className = `btn ${section.btnClass}`;
                    btn.dataset.freq = group.freq;
                    btn.dataset.dbfs = exactDb;
                    btn.dataset.offset = offset;
                    btn.dataset.pan = section.pan;
                    btn.dataset.ear = section.ear;

                    btn.innerHTML = `
                        <div class="btn-db">${exactDb}</div>
                        <div class="btn-off">(${offset})</div>
                    `;

                    btn.addEventListener('pointerdown', () => handleTonePlay(btn));
                    btnRow.appendChild(btn);
                }

                btnRow.appendChild(padEnd);
                row.appendChild(btnRow);
                container.appendChild(row);
            });
        });

        window.onload = adjustWindowHeight;

        // Audio Engine Logic
        let audioCtx = null;
        let activeOsc = null;
        let activePanner = null;
        let masterGain = null;
        let pulseGain = null;
        let pulseInterval = null;
        let activeBtn = null;
        let currentPulseState = true;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function stopTone() {
            if (activeOsc) {
                const oscToStop = activeOsc;
                const gainToStop = masterGain;
                const pulseToStop = pulseGain;
                const panToStop = activePanner;

                gainToStop.gain.cancelScheduledValues(audioCtx.currentTime);
                gainToStop.gain.setTargetAtTime(0, audioCtx.currentTime, 0.015);

                setTimeout(() => {
                    try { oscToStop.stop(); oscToStop.disconnect(); } catch(e){}
                    try { gainToStop.disconnect(); pulseToStop.disconnect(); panToStop.disconnect(); } catch(e){}
                }, 50);
            }
            
            activeOsc = null;
            masterGain = null;
            pulseGain = null;
            activePanner = null;

            if (pulseInterval) {
                clearInterval(pulseInterval);
                pulseInterval = null;
            }
            if (activeBtn) {
                activeBtn.classList.remove('active', 'pulsing');
                activeBtn = null;
            }
            
            hudStatus.innerText = "SYSTEM STANDBY";
            hudStatus.style.color = "#71717a";
            hudValues.innerHTML = "Select a frequency node";
        }

        function handleTonePlay(btn) {
            initAudio();

            if (activeBtn === btn) {
                stopTone();
                return;
            }

            stopTone();
            activeBtn = btn;
            
            const isContinuous = pulseToggle.checked;
            btn.classList.add('active');
            if (!isContinuous) btn.classList.add('pulsing');

            const freq = parseFloat(btn.dataset.freq);
            const dbfs = parseFloat(btn.dataset.dbfs);
            const offset = parseInt(btn.dataset.offset);
            const pan = parseFloat(btn.dataset.pan);
            const ear = btn.dataset.ear;

            hudStatus.innerText = `TRANSMITTING — ${ear}`;
            hudStatus.style.color = pan === 1 ? "#fca5a5" : "#93c5fd";
            hudValues.innerHTML = `
                ${freq / 1000} kHz 
                <span style="opacity: 0.3; margin: 0 5px;">|</span> 
                <span class="highlight">${dbfs}</span> <span style="font-size: 16px;">dBFS</span>
                <span style="opacity: 0.3; margin: 0 5px;">|</span> 
                <span style="font-size: 16px;">OS:</span> <span class="highlight">${offset}</span>
            `;

            const targetGain = Math.pow(10, dbfs / 20);

            activeOsc = audioCtx.createOscillator();
            activeOsc.type = 'sine';
            activeOsc.frequency.value = freq;

            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.01);

            pulseGain = audioCtx.createGain();
            pulseGain.gain.value = 1;

            activePanner = audioCtx.createStereoPanner();
            activePanner.pan.value = pan;

            activeOsc.connect(pulseGain);
            pulseGain.connect(masterGain);
            masterGain.connect(activePanner);
            activePanner.connect(audioCtx.destination);

            activeOsc.start();

            if (!isContinuous) {
                currentPulseState = true;
                pulseInterval = setInterval(() => {
                    currentPulseState = !currentPulseState;
                    pulseGain.gain.setTargetAtTime(currentPulseState ? 1 : 0, audioCtx.currentTime, 0.01);
                }, 250);
            }
        }

        pulseToggle.addEventListener('change', () => {
            if (activeBtn) {
                const currentBtn = activeBtn;
                stopTone();
                setTimeout(() => handleTonePlay(currentBtn), 60);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && window.KeyboardMaestro) {
                window.KeyboardMaestro.Submit("Cancel");
            }
        });
    </script>
</body>
</html>
