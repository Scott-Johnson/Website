<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Audiology Generator</title>
    <style>
        @keyframes bootUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        :root {
            --left-color: #60a5fa;
            --right-color: #f87171;
            --track-color: #404040;
        }

        html {
            background: #050507;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background: radial-gradient(circle at 10% 50%, rgba(59, 130, 246, 0.15), transparent 40%),
                        radial-gradient(circle at 90% 50%, rgba(239, 68, 68, 0.12), transparent 40%),
                        #050507;
            color: #e4e4e7;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden;
            animation: bootUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            user-select: none; -webkit-user-select: none;
        }

        /* Solid Dark HUD */
        #topBar {
            height: 85px;
            background: rgba(15, 15, 20, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            flex-shrink: 0;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .left-controls {
            display: flex; align-items: center; gap: 20px; width: 450px;
        }

        .hud-display {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex-grow: 1; transition: all 0.2s ease;
        }

        .hud-status {
            font-size: 11px; text-transform: uppercase; letter-spacing: 3px;
            color: #71717a; margin-bottom: 6px; font-weight: 600;
        }

        .hud-values {
            font-size: 28px; font-weight: 200; color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
            text-align: center;
        }

        .hud-values span.highlight { font-weight: 500; color: #e4e4e7; }

        /* Sleek Glass Toggle & Pulse Controls */
        .controls-right {
            display: flex; align-items: center; gap: 15px;
            font-size: 13px; font-weight: 500; color: #a1a1aa; width: 480px; justify-content: flex-end;
        }

        .pulse-sliders {
            display: flex; gap: 12px; align-items: center; background: rgba(255,255,255,0.02);
            padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
            transition: opacity 0.2s;
        }

        .pulse-sliders.disabled {
            opacity: 0.2; pointer-events: none;
        }

        .pulse-param {
            display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4);
        }

        .pulse-param span.val-readout {
            width: 38px; color: #a1a1aa; text-align: left; font-weight: normal; display: inline-block;
        }

        .switch { position: relative; display: inline-block; width: 44px; height: 22px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.05); border-radius: 22px; transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 2px; bottom: 2px; background-color: #a1a1aa; border-radius: 50%; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        input:checked + .slider { background-color: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
        input:checked + .slider:before { transform: translateX(22px); background-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); }

        /* Custom Subtle Volume/Trim/Pulse Bar */
        .volume-control, .pulse-param {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4);
            letter-spacing: 1.5px;
        }

        .trim-readout {
            display: inline-block; width: 38px; text-align: right;
            color: #a1a1aa;
        }

        input[type=range] {
            -webkit-appearance: none; background: transparent;
        }
        .volume-control input[type=range] { width: 80px; }
        .pulse-param input[type=range] { width: 60px; }

        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 3px; cursor: pointer;
            background: var(--track-color); border-radius: 1.5px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 12px; width: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.6); cursor: pointer;
            -webkit-appearance: none; margin-top: -4.5px;
            transition: background 0.1s, transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            background: rgba(255,255,255,0.9); transform: scaleY(1.1);
        }

        .boost-btns {
            display: flex; gap: 4px; margin-left: 4px;
        }
        .boost-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #a1a1aa; border-radius: 4px; font-size: 10px;
            padding: 3px 6px; cursor: pointer; transition: all 0.15s;
            font-weight: 600; letter-spacing: 0.5px;
        }
        .boost-btn:hover {
            background: rgba(255, 255, 255, 0.15); color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }
        .boost-btn:active { transform: scale(0.95); }

        /* Main Content Layout */
        #content {
            flex: 1; padding: 25px 40px; display: flex; flex-direction: column; gap: 25px;
            overflow-y: auto; overflow-x: hidden;
        }

        /* Solid Dark Ear Sections */
        .ear-section {
            background: rgba(20, 20, 25, 0.9);
            border-radius: 16px; padding: 20px 25px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex; flex-direction: column; gap: 10px;
        }

        .section-title {
            font-size: 14px; font-weight: 600; margin: 0; padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06); letter-spacing: 2px;
        }

        .right-title { color: var(--right-color); text-shadow: 0 0 10px rgba(248, 113, 113, 0.3); }
        .left-title { color: var(--left-color); text-shadow: 0 0 10px rgba(96, 165, 250, 0.3); }

        .freq-row {
            display: flex; align-items: center;
            background: rgba(0,0,0,0.15); border-radius: 10px; padding: 6px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .freq-label {
            width: 80px; flex-shrink: 0; font-size: 14px; font-weight: 500;
            color: rgba(255,255,255,0.7); text-align: right; padding-right: 18px;
        }

        .button-row {
            display: flex; flex-wrap: nowrap; gap: 6px; flex-grow: 1;
        }

        /* Fixed-Size Buttons */
        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px; padding: 7px 0;
            width: 54px;
            flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s cubic-bezier(0.2, 1, 0.3, 1);
            color: #a1a1aa; box-sizing: border-box;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2);
            color: #fff; transform: translateY(-1px);
        }

        /* Active States */
        .right-ear-btn.active {
            background: rgba(239, 68, 68, 0.2); border-color: #fca5a5; color: #fff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3), inset 0 0 10px rgba(239, 68, 68, 0.2);
        }

        .left-ear-btn.active {
            background: rgba(59, 130, 246, 0.2); border-color: #93c5fd; color: #fff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3), inset 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .btn.pulsing { animation: pulse-glass 0.5s infinite alternate; }
        @keyframes pulse-glass {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        .btn-db { font-size: 13px; font-weight: 500; }
        .btn-off { font-size: 10px; opacity: 0.5; margin-top: 3px; font-weight: 400; }

        @media (max-width: 850px) {
            #topBar { height: auto; flex-direction: column; padding: 15px 20px; gap: 20px; }
            .left-controls { width: 100%; flex-direction: column; justify-content: center; gap: 15px; }
            .hud-display { width: 100%; text-align: center; }
            .hud-values { font-size: 22px; }
            .controls-right { width: 100%; justify-content: center; flex-wrap: wrap; }
            .volume-control { flex-wrap: wrap; justify-content: center; }
            #content { padding: 15px; gap: 15px; }
            .ear-section { padding: 15px; }
            .freq-row { flex-direction: column; align-items: flex-start; padding: 12px; }
            .freq-label { width: 100%; text-align: left; padding-right: 0; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; }
            .button-row { flex-wrap: wrap; justify-content: center; width: 100%; }
        }
    </style>
</head>
<body data-kmwindow="SCREEN(Main,Center,0%),SCREEN(Main,Center,10%),1730,970" data-kmwindowbuttons="none">

    <div id="topBar">
        <div class="left-controls">
            <h1 style="margin:0; font-size: 14px; color: rgba(255,255,255,0.4); font-weight: 500; letter-spacing: 1px;">TONE WORKSPACE</h1>
            <div class="volume-control">
                <span>TRIM</span>
                <input type="range" id="volumeControl" min="-30" max="30" step="1" value="0">
                <span class="trim-readout" id="trimReadout">0 dB</span>
                <div class="boost-btns">
                    <button class="boost-btn" id="btnCut5">-5 dB</button>
                    <button class="boost-btn" id="btnCut1">-1 dB</button>
                    <button class="boost-btn" id="btnBoost1">+1 dB</button>
                    <button class="boost-btn" id="btnBoost5">+5 dB</button>
                </div>
            </div>
        </div>
        
        <div class="hud-display" id="hud">
            <div class="hud-status" id="hudStatus">SYSTEM STANDBY</div>
            <div class="hud-values" id="hudValues">Select a frequency node</div>
        </div>

        <div class="controls-right">
            <div class="pulse-sliders" id="pulseSliders">
                <div class="pulse-param">
                    <span>BPM</span>
                    <input type="range" id="pulseBpm" min="40" max="240" step="1" value="120">
                    <span class="val-readout" id="bpmReadout">120</span>
                </div>
                <div class="pulse-param">
                    <span>DUTY</span>
                    <input type="range" id="pulseDuty" min="10" max="90" step="5" value="50">
                    <span class="val-readout" id="dutyReadout">50/50</span>
                </div>
            </div>
            <span>Pulse Array</span>
            <label class="switch">
                <input type="checkbox" id="pulseToggle">
                <span class="slider"></span>
            </label>
            <span>Pure Tone</span>
        </div>
    </div>

    <div id="content">
        <div id="rightEarContainer" class="ear-section">
            <h2 class="section-title right-title">RIGHT CHANNEL</h2>
        </div>
        
        <div id="leftEarContainer" class="ear-section">
            <h2 class="section-title left-title">LEFT CHANNEL</h2>
        </div>
    </div>

    <script>
        const config = [
            {
                ear: 'RIGHT EAR',
                containerId: 'rightEarContainer',
                pan: 1,
                btnClass: 'right-ear-btn',
                groups: [
                    { freq: 14500, start: -55.6, end: -30.6 },
                    { freq: 14000, start: -65.6, end: -40.6 },
                    { freq: 13500, start: -65.6, end: -40.6 },
                    { freq: 13000, start: -65.6, end: -40.6 }
                ]
            },
            {
                ear: 'LEFT EAR',
                containerId: 'leftEarContainer',
                pan: -1,
                btnClass: 'left-ear-btn',
                groups: [
                    { freq: 14000, start: -42.6, end: -32.6 },
                    { freq: 13500, start: -49.6, end: -39.6 },
                    { freq: 13000, start: -65.6, end: -43.6 },
                    { freq: 12500, start: -73.6, end: -53.6 },
                    { freq: 12000, start: -73.6, end: -53.6 }
                ]
            }
        ];

        const pulseToggle = document.getElementById('pulseToggle');
        const pulseSliders = document.getElementById('pulseSliders');
        const pulseBpm = document.getElementById('pulseBpm');
        const pulseDuty = document.getElementById('pulseDuty');
        const bpmReadout = document.getElementById('bpmReadout');
        const dutyReadout = document.getElementById('dutyReadout');
        
        const volumeControl = document.getElementById('volumeControl');
        const trimReadout = document.getElementById('trimReadout');
        const btnCut5 = document.getElementById('btnCut5');
        const btnCut1 = document.getElementById('btnCut1');
        const btnBoost1 = document.getElementById('btnBoost1');
        const btnBoost5 = document.getElementById('btnBoost5');
        const hudStatus = document.getElementById('hudStatus');
        const hudValues = document.getElementById('hudValues');

        let globalDbTrim = parseFloat(volumeControl.value);

        function adjustWindowHeight() {
            if (window.KeyboardMaestro) {
                setTimeout(() => { window.KeyboardMaestro.ResizeWindow("1730,970"); }, 50);
            }
        }

        // Build UI Grid Engine
        config.forEach(section => {
            const container = document.getElementById(section.containerId);
            
            section.groups.forEach(group => {
                const row = document.createElement('div');
                row.className = 'freq-row';
                
                const label = document.createElement('div');
                label.className = 'freq-label';
                label.innerText = `${group.freq / 1000} kHz`;
                row.appendChild(label);

                const btnRow = document.createElement('div');
                btnRow.className = 'button-row';

                for (let db = group.start; db <= group.end + 0.1; db += 1) {
                    const exactDb = parseFloat(db.toFixed(1));
                    
                    // Unified offset scaling engine to dynamically calculate exact targets requested
                    const formulaConst = 33.6;
                    const offset = Math.round(exactDb + formulaConst);

                    const btn = document.createElement('div');
                    btn.className = `btn ${section.btnClass}`;
                    btn.dataset.freq = group.freq;
                    btn.dataset.dbfs = exactDb;
                    btn.dataset.pan = section.pan;
                    btn.dataset.ear = section.ear;
                    btn.dataset.fconst = formulaConst;

                    btn.innerHTML = `
                        <div class="btn-db">${exactDb}</div>
                        <div class="btn-off">(${offset})</div>
                    `;

                    btn.onclick = () => handleTonePlay(btn);
                    btnRow.appendChild(btn);
                }

                row.appendChild(btnRow);
                container.appendChild(row);
            });
        });

        window.onload = adjustWindowHeight;

        // Dynamic Audio Engines
        let audioCtx = null;
        let activeOsc = null;
        let activePanner = null;
        let masterGain = null;
        let pulseGain = null;
        let pulseTimeout = null;
        let activeBtn = null;
        let currentPulseState = true;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function stopTone() {
            if (activeOsc) {
                const oscToStop = activeOsc;
                const gainToStop = masterGain;
                const pulseToStop = pulseGain;
                const panToStop = activePanner;

                gainToStop.gain.cancelScheduledValues(audioCtx.currentTime);
                gainToStop.gain.setTargetAtTime(0, audioCtx.currentTime, 0.015);

                setTimeout(() => {
                    try { oscToStop.stop(); oscToStop.disconnect(); } catch(e){}
                    try { gainToStop.disconnect(); pulseToStop.disconnect(); panToStop.disconnect(); } catch(e){}
                }, 50);
            }
            
            activeOsc = null;
            masterGain = null;
            pulseGain = null;
            activePanner = null;

            if (pulseTimeout) {
                clearTimeout(pulseTimeout);
                pulseTimeout = null;
            }
            if (activeBtn) {
                activeBtn.classList.remove('active', 'pulsing');
                activeBtn = null;
            }
            
            hudStatus.innerText = "SYSTEM STANDBY";
            hudStatus.style.color = "#71717a";
            hudValues.innerHTML = "Select a frequency node";
        }

        function updateActiveToneLive() {
            if (!activeBtn) return;
            
            const freq = parseFloat(activeBtn.dataset.freq);
            const baseDbfs = parseFloat(activeBtn.dataset.dbfs);
            const fConst = parseFloat(activeBtn.dataset.fconst);
            
            const effectiveDbfs = parseFloat((baseDbfs + globalDbTrim).toFixed(1));
            const effectiveOffset = Math.round(effectiveDbfs + fConst);

            hudValues.innerHTML = `
                ${freq / 1000} kHz 
                &nbsp;&nbsp;&nbsp; 
                <span class="highlight">${effectiveDbfs} dBFS</span> 
                &nbsp;&nbsp;&nbsp; 
                OS: <span class="highlight">${effectiveOffset}</span>
            `;

            if (masterGain && audioCtx) {
                const newGain = Math.pow(10, effectiveDbfs / 20);
                masterGain.gain.setTargetAtTime(newGain, audioCtx.currentTime, 0.01);
            }
        }

        // Pulse Engine Orchestrator
        function runPulseCycle() {
            if (!activeBtn || pulseToggle.checked) return;

            const bpm = parseInt(pulseBpm.value);
            const duty = parseInt(pulseDuty.value);
            
            const totalCycleMs = (60 / bpm) * 1000;
            const onDuration = totalCycleMs * (duty / 100);
            const offDuration = totalCycleMs * ((100 - duty) / 100);

            if (currentPulseState) {
                pulseGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.008);
                if(activeBtn) activeBtn.classList.add('pulsing');
                pulseTimeout = setTimeout(() => {
                    currentPulseState = false;
                    runPulseCycle();
                }, onDuration);
            } else {
                pulseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.008);
                if(activeBtn) activeBtn.classList.remove('pulsing');
                pulseTimeout = setTimeout(() => {
                    currentPulseState = true;
                    runPulseCycle();
                }, offDuration);
            }
        }

        function handleTonePlay(btn) {
            initAudio();

            if (activeBtn === btn) {
                stopTone();
                return;
            }

            stopTone();
            activeBtn = btn;
            
            const isPureTone = pulseToggle.checked;
            btn.classList.add('active');

            const freq = parseFloat(btn.dataset.freq);
            const baseDbfs = parseFloat(btn.dataset.dbfs);
            const pan = parseFloat(btn.dataset.pan);
            const ear = btn.dataset.ear;
            const fConst = parseFloat(btn.dataset.fconst);
            
            const effectiveDbfs = parseFloat((baseDbfs + globalDbTrim).toFixed(1));
            const effectiveOffset = Math.round(effectiveDbfs + fConst);

            hudStatus.innerText = `TRANSMITTING — ${ear}`;
            hudStatus.style.color = pan === 1 ? "#fca5a5" : "#93c5fd";
            hudValues.innerHTML = `
                ${freq / 1000} kHz 
                &nbsp;&nbsp;&nbsp; 
                <span class="highlight">${effectiveDbfs} dBFS</span> 
                &nbsp;&nbsp;&nbsp; 
                OS: <span class="highlight">${effectiveOffset}</span>
            `;

            const targetGain = Math.pow(10, effectiveDbfs / 20);

            activeOsc = audioCtx.createOscillator();
            activeOsc.type = 'sine';
            activeOsc.frequency.value = freq;

            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.01);

            pulseGain = audioCtx.createGain();
            pulseGain.gain.value = 1;

            activePanner = audioCtx.createStereoPanner();
            activePanner.pan.value = pan;

            activeOsc.connect(pulseGain);
            pulseGain.connect(masterGain);
            masterGain.connect(activePanner);
            activePanner.connect(audioCtx.destination);

            activeOsc.start();

            if (!isPureTone) {
                currentPulseState = true;
                runPulseCycle();
            }
        }

        // Global Controllers
        function setTrim(value) {
            globalDbTrim = value;
            volumeControl.value = globalDbTrim;
            trimReadout.innerText = (globalDbTrim > 0 ? '+' : '') + globalDbTrim + ' dB';
            updateActiveToneLive();
        }

        volumeControl.addEventListener('input', (e) => {
            setTrim(parseFloat(e.target.value));
        });

        function applyBoost(amount) {
            let newVal = parseFloat(volumeControl.value) + amount;
            if (newVal > parseFloat(volumeControl.max)) newVal = parseFloat(volumeControl.max);
            if (newVal < parseFloat(volumeControl.min)) newVal = parseFloat(volumeControl.min);
            setTrim(newVal);
        }

        btnCut5.addEventListener('click', () => applyBoost(-5));
        btnCut1.addEventListener('click', () => applyBoost(-1));
        btnBoost1.addEventListener('click', () => applyBoost(1));
        btnBoost5.addEventListener('click', () => applyBoost(5));

        // Pulse Arrays Handlers
        pulseBpm.addEventListener('input', (e) => {
            bpmReadout.innerText = e.target.value;
            if (activeBtn && !pulseToggle.checked) {
                clearTimeout(pulseTimeout);
                runPulseCycle();
            }
        });

        pulseDuty.addEventListener('input', (e) => {
            const val = e.target.value;
            dutyReadout.innerText = `${val}/${100 - val}`;
            if (activeBtn && !pulseToggle.checked) {
                clearTimeout(pulseTimeout);
                runPulseCycle();
            }
        });

        function updatePulseSlidersState() {
            if(pulseToggle.checked) {
                pulseSliders.classList.add('disabled');
            } else {
                pulseSliders.classList.remove('disabled');
            }
        }

        pulseToggle.addEventListener('change', () => {
            updatePulseSlidersState();
            if (activeBtn) {
                const currentBtn = activeBtn;
                stopTone();
                setTimeout(() => handleTonePlay(currentBtn), 60);
            }
        });

        // Initialize Slider State Check
        updatePulseSlidersState();

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && window.KeyboardMaestro) {
                window.KeyboardMaestro.Submit("Cancel");
            }
        });
    </script>
</body>
</html>
